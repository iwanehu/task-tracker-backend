spring.application.name=demo

# Variante moderna para Spring Boot 3.x / 4.x
spring.data.mongodb.database=task_tracker
spring.mongodb.embedded.version=false
spring.data.mongodb.uri=${mongo_url}

# Propiedad alternativa por si tu starter es el clásico de data
spring.data.mongodb.repositories.enabled=true


#puerto
server.port=${PORT:8080}

# Configuración explícita de Springdoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.packages-to-scan=task_tracker.demo.controller

springdoc.show-actuator=false
